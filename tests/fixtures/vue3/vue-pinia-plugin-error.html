<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Pinia Plugin Error</title>
  <script src="./vendor/vue.global.js"></script>
  <script>
    // Pinia 2.x IIFE 依赖全局 VueDemi shim
    window.VueDemi = window.Vue;
  </script>
  <script src="./vendor/pinia.global.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const { createApp } = Vue;
    const { createPinia } = Pinia;

    const pinia = createPinia();

    // 业务自定义 Pinia 插件，在 install 阶段（即 store 初始化时被 shieldPlugin 之外的链路调用）抛错
    function badPlugin(ctx) {
      // ctx.store 在 shieldPlugin 注册之后被遍历，此插件抛错应触发 pinia.use 包装层捕获
      throw new Error('pinia plugin install error');
    }

    try {
      pinia.use(badPlugin);
    } catch {
      // shield 已捕获并 emit pinia-plugin-error
    }

    const app = createApp({});
    app.use(pinia);
    app.mount('#app');
  </script>
</body>
</html>
